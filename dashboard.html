<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PantryIQ Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f4f7fb;
      color: #222;
    }
    .header {
      background: #1f3a5f;
      color: white;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      border-top: 8px solid;
      text-align: center;
    }
    .green {
      border-top-color: #27ae60;
    }
    .red {
      border-top-color: #e74c3c;
      background: #fff5f5;
    }
    .status {
      font-weight: bold;
      margin-top: 10px;
    }
    .alert {
      color: #e74c3c;
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>PantryIQ Dashboard</h1>
    <p>Real-time smart inventory monitoring</p>
  </div>

  <div class="grid">
    <div class="card green">
      <h2>Rice</h2>
      <p class="status">Stock: 85%</p>
      <p>Healthy</p>
    </div>

    <div class="card green">
      <h2>Sugar</h2>
      <p class="status">Stock: 70%</p>
      <p>Healthy</p>
    </div>

    <div class="card red">
      <h2>Dal</h2>
      <p class="status">Stock: 12%</p>
      <p class="alert">Low Stock Alert</p>
    </div>
  </div>
</body>
</html>
