<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PantryIQ - Smart Food Inventory Management</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 5px;
        }

        .tagline {
            color: #666;
            font-size: 14px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .stat {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        .stat-value {
            color: #667eea;
            font-weight: bold;
            font-size: 18px;
        }

        .form-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .form-section h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #333;
            font-size: 14px;
            margin-bottom: 5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: inherit;
            font-size: 14px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        button:active {
            transform: scale(0.98);
        }

        .inventory-list {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .inventory-list h2 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .inventory-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .item-name {
            font-weight: bold;
            color: #333;
        }

        .item-qty {
            color: #667eea;
            font-size: 18px;
            font-weight: bold;
        }

        .delete-btn {
            background: #ff6b6b;
            padding: 5px 10px;
            font-size: 12px;
        }

        .delete-btn:hover {
            opacity: 0.8;
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🥘 PantryIQ</h1>
            <p class="tagline">Smart Food Inventory Management System</p>
        </header>

        <div id="alertContainer"></div>

        <div class="form-section">
            <h2>➕ Add Food Item</h2>
            <div class="grid-2">
                <div class="form-group">
                    <label>Food Item Name</label>
                    <input type="text" id="itemName" placeholder="e.g., Chicken, Rice, Flour">
                </div>
                <div class="form-group">
                    <label>Quantity (in KG)</label>
                    <input type="number" id="itemQty" placeholder="e.g., 5" min="0" step="0.5">
                </div>
                <div class="form-group">
                    <label>Expiry Date</label>
                    <input type="date" id="itemExpiry">
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select id="itemCategory">
                        <option value="">Select Category</option>
                        <option value="Grains">Grains</option>
                        <option value="Vegetables">Vegetables</option>
                        <option value="Meat">Meat</option>
                        <option value="Dairy">Dairy</option>
                        <option value="Spices">Spices</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>
            <button onclick="addItem()">Add Item</button>
        </div>

        <div class="dashboard">
            <div class="card">
                <h2>📦 Total Items</h2>
                <div class="stat">
                    <span class="stat-label">Items in Stock</span>
                    <span class="stat-value" id="totalItems">0</span>
                </div>
            </div>
            <div class="card">
                <h2>⚠️ Expiring Soon</h2>
                <div class="stat">
                    <span class="stat-label">Items (next 7 days)</span>
                    <span class="stat-value" id="expiringItems">0</span>
                </div>
            </div>
            <div class="card">
                <h2>📊 Total Weight</h2>
                <div class="stat">
                    <span class="stat-label">Total KG</span>
                    <span class="stat-value" id="totalWeight">0</span>
                </div>
            </div>
        </div>

        <div class="inventory-list">
            <h2>📋 Current Inventory</h2>
            <div id="inventoryContainer">
                <p style="color: #999; text-align: center;">No items added yet. Add your first item!</p>
            </div>
        </div>
    </div>

    <script>
        // Get data from localStorage or initialize empty array
        let inventory = JSON.parse(localStorage.getItem('pantryiq_inventory')) || [];

        // Add a new item
        function addItem() {
            const name = document.getElementById('itemName').value.trim();
            const qty = parseFloat(document.getElementById('itemQty').value);
            const expiry = document.getElementById('itemExpiry').value;
            const category = document.getElementById('itemCategory').value;

            // Validation
            if (!name || !qty || !expiry || !category) {
                showAlert('❌ Please fill in all fields!', 'error');
                return;
            }

            if (qty <= 0) {
                showAlert('❌ Quantity must be greater than 0!', 'error');
                return;
            }

            // Create new item
            const newItem = {
                id: Date.now(),
                name: name,
                quantity: qty,
                expiry: expiry,
                category: category,
                dateAdded: new Date().toLocaleDateString()
            };

            // Add to inventory
            inventory.push(newItem);
            localStorage.setItem('pantryiq_inventory', JSON.stringify(inventory));

            // Clear form
            document.getElementById('itemName').value = '';
            document.getElementById('itemQty').value = '';
            document.getElementById('itemExpiry').value = '';
            document.getElementById('itemCategory').value = '';

            showAlert('✅ Item added successfully!', 'success');
            updateDashboard();
        }

        // Delete an item
        function deleteItem(id) {
            inventory = inventory.filter(item => item.id !== id);
            localStorage.setItem('pantryiq_inventory', JSON.stringify(inventory));
            showAlert('✅ Item deleted!', 'success');
            updateDashboard();
        }

        // Update dashboard stats
        function updateDashboard() {
            const now = new Date();
            const sevenDaysLater = new Date(now.getTime() + 7 * 24 * 60 * 60 * 1000);

            let totalItems = inventory.length;
            let totalWeight = inventory.reduce((sum, item) => sum + item.quantity, 0).toFixed(2);
            let expiringItems = inventory.filter(item => {
                const expiryDate = new Date(item.expiry);
                return expiryDate >= now && expiryDate <= sevenDaysLater;
            }).length;

            document.getElementById('totalItems').textContent = totalItems;
            document.getElementById('totalWeight').textContent = totalWeight + ' KG';
            document.getElementById('expiringItems').textContent = expiringItems;

            // Render inventory list
            const container = document.getElementById('inventoryContainer');
            if (inventory.length === 0) {
                container.innerHTML = '<p style="color: #999; text-align: center;">No items added yet. Add your first item!</p>';
            } else {
                container.innerHTML = inventory.map(item => `
                    <div class="inventory-item">
                        <div>
                            <div class="item-name">${item.name}</div>
                            <div style="color: #999; font-size: 12px;">
                                Category: ${item.category} | Expires: ${item.expiry}
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div class="item-qty">${item.quantity} KG</div>
                            <button class="delete-btn" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Show alert message
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const alertDiv = document.createElement('div');
            alertDiv.className = `alert alert-${type}`;
            alertDiv.textContent = message;
            alertContainer.appendChild(alertDiv);

            setTimeout(() => {
                alertDiv.remove();
            }, 3000);
        }

        // Load dashboard on page load
        updateDashboard();
    </script>
</body>
</html>
